<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Vendor — Katalog Sablon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="css/admin.css" rel="stylesheet" />
  <style>
    .vendor-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .vendor-info {
      flex: 1;
      min-width: 0;
    }

    .vendor-name {
      font-size: 14px;
      font-weight: 600;
    }

    .vendor-meta {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .vendor-note {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 2px;
      font-style: italic;
    }

    .vendor-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <!-- ═══ APP ═══ -->
  <div class="admin-app" id="adminApp">
    <header>
      <div class="header-inner">
        <div class="brand">Daftar Vendor<div class="brand-sub">Tulehu Inkline</div>
        </div>
        <div class="header-actions">
          <a class="link-btn" href="dashboard.html">Dashboard</a>
          <a class="link-btn" href="admin.html">Admin Produk</a>
          <a class="link-btn" href="pesanan.html">Daftar Pesanan</a>
          <a class="link-btn" href="keuangan.html">Keuangan</a>
          <a class="link-btn" href="stok.html">Stok Vendor</a>
          <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="toolbar-row">
        <h2>Vendor</h2>
        <button class="btn-primary" id="addBtn">+ Tambah Vendor</button>
      </div>

      <div class="status-msg" id="statusMsg"></div>
      <div id="vendorList">
        <div class="empty-state">Memuat vendor...</div>
      </div>
    </div>
  </div>

  <!-- ═══ FORM MODAL ═══ -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h3 id="modalTitle">Tambah Vendor</h3>
      <form id="vendorForm">
        <div class="field">
          <label>Nama Vendor</label>
          <input type="text" id="f_nama" required />
        </div>
        <div class="field">
          <label>Nomor WA</label>
          <input type="text" id="f_no_wa" placeholder="08xxxxxxxxxx atau 62xxxxxxxxxx" required />
          <div class="field-hint">Boleh format 08xx atau 62xx, nanti otomatis dirapikan pas kirim WA.</div>
        </div>
        <div class="field">
          <label>Catatan (opsional)</label>
          <textarea id="f_catatan" placeholder="Spesialisasi, harga langganan, dll"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Batal</button>
          <button type="submit" class="btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin-core.js?v=6"></script>
  <script>
    let vendors = [];
    let editingId = null;

    function authHeaders(json) { return window.authHeaders(json); }
    async function apiGetVendors() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/vendors`, { headers: authHeaders() });
      return res.json();
    }
    async function apiCreateVendor(data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/vendors`, { method: 'POST', headers: authHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiUpdateVendor(id, data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/vendors/${id}`, { method: 'PUT', headers: authHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiDeleteVendor(id) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/vendors/${id}`, { method: 'DELETE', headers: authHeaders() });
      return res.json();
    }

    async function tryLoginCb(token) {
      const json = await apiGetVendors();
      if (json.status !== 'success') throw new Error(json.message || 'gagal');
      vendors = json.data;
      renderVendors();
    }

    window.requireAuth(tryLoginCb);

    /* ── RENDER LIST ── */
    function renderVendors() {
      const wrap = document.getElementById('vendorList');
      if (!vendors.length) {
        wrap.innerHTML = '<div class="empty-state">Belum ada vendor. Klik "+ Tambah Vendor".</div>';
        return;
      }
      wrap.innerHTML = vendors.map(v => `
    <div class="vendor-row">
      <div class="vendor-info">
        <div class="vendor-name">${v.nama}</div>
        <div class="vendor-meta">📱 ${v.no_wa || '-'}</div>
        ${v.catatan ? `<div class="vendor-note">${v.catatan}</div>` : ''}
      </div>
      <div class="vendor-actions">
        <button class="icon-btn" data-action="edit" data-id="${v.id}">Edit</button>
        <button class="icon-btn danger" data-action="delete" data-id="${v.id}">Hapus</button>
      </div>
    </div>
  `).join('');
    }

    document.getElementById('vendorList').addEventListener('click', async e => {
      const btn = e.target.closest('.icon-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      const v = vendors.find(x => String(x.id) === String(id));
      if (!v) return;

      if (btn.dataset.action === 'edit') openModal(v);

      if (btn.dataset.action === 'delete') {
        if (!confirm(`Hapus vendor "${v.nama}"?`)) return;
        btn.disabled = true;
        const json = await apiDeleteVendor(id);
        btn.disabled = false;
        if (json.status === 'success') {
          vendors = vendors.filter(x => String(x.id) !== String(id));
          renderVendors();
          showStatus('Vendor dihapus.', true);
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      }
    });

    /* ── MODAL FORM ── */
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const form = document.getElementById('vendorForm');

    function openModal(v) {
      editingId = v ? v.id : null;
      modalTitle.textContent = v ? 'Edit Vendor' : 'Tambah Vendor';
      document.getElementById('f_nama').value = v ? v.nama || '' : '';
      document.getElementById('f_no_wa').value = v ? v.no_wa || '' : '';
      document.getElementById('f_catatan').value = v ? v.catatan || '' : '';
      modalBackdrop.classList.add('show');
    }
    function closeModal() {
      modalBackdrop.classList.remove('show');
      editingId = null;
      form.reset();
    }

    document.getElementById('addBtn').addEventListener('click', () => openModal(null));
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';

      const data = {
        nama: document.getElementById('f_nama').value.trim(),
        no_wa: document.getElementById('f_no_wa').value.trim(),
        catatan: document.getElementById('f_catatan').value.trim(),
      };

      try {
        let json;
        if (editingId) {
          json = await apiUpdateVendor(editingId, data);
        } else {
          json = await apiCreateVendor(data);
        }

        if (json.status === 'success') {
          showStatus(editingId ? 'Vendor diupdate.' : 'Vendor ditambahkan.', true);
          closeModal();
          const refreshed = await apiGetVendors();
          vendors = refreshed.data;
          renderVendors();
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      } catch (err) {
        showStatus('Gagal konek ke server: ' + err.message, false);
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'Simpan';
    });

    window.registerSW();
  </script>
</body>

</html>
