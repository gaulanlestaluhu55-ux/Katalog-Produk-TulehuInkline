<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Keuangan — Katalog Sablon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="css/admin.css" rel="stylesheet" />
  <style>
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .summary-card .label {
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 20px;
      font-weight: 600;
    }

    .summary-card.saldo .value {
      color: var(--ink);
    }

    .summary-card.masuk .value {
      color: var(--accent-text);
    }

    .summary-card.keluar .value {
      color: var(--err-text);
    }

    @media (max-width: 600px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    .account-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .account-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }

    .account-card .label {
      font-size: 11px;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .account-card .value {
      font-size: 16px;
      font-weight: 600;
    }

    .account-manage {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .account-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 6px 4px 12px;
    }

    .account-tag button {
      border: none;
      background: none;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 50%;
    }

    .account-tag button:hover {
      color: var(--err-text);
      background: var(--err-bg);
    }

    .account-add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .account-add-row input {
      flex: 1;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    .account-add-row input:focus {
      border-color: var(--ink);
    }

    .account-add-row button {
      height: 34px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--ink);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .tx-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .tx-left {
      min-width: 0;
    }

    .tx-desc {
      font-size: 14px;
      font-weight: 600;
    }

    .tx-meta {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .tx-akun {
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    .tx-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .tx-amount {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .tx-amount.masuk {
      color: var(--accent-text);
    }

    .tx-amount.keluar {
      color: var(--err-text);
    }

    .source-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .source-badge.pesanan {
      background: var(--info-bg);
      color: var(--info-text);
    }

    .source-badge.manual {
      background: var(--bg);
      color: var(--ink-soft);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>

  <!-- ═══ APP ═══ -->
  <div class="admin-app" id="adminApp">
    <header>
      <div class="header-inner">
        <div class="brand">Keuangan<div class="brand-sub">Tulehu Inkline</div>
        </div>
        <div class="header-actions">
          <a class="link-btn" href="dashboard.html">Dashboard</a>
          <a class="link-btn" href="admin.html">Admin Produk</a>
          <a class="link-btn" href="pesanan.html">Daftar Pesanan</a>
          <a class="link-btn" href="stok.html">Stok Vendor</a>
          <a class="link-btn" href="vendor.html">Daftar Vendor</a>
          <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="status-msg" id="statusMsg"></div>

      <!-- ── Ringkasan saldo total ── -->
      <div class="summary-grid">
        <div class="summary-card saldo">
          <div class="label">Total Saldo (Semua Akun)</div>
          <div class="value" id="sumSaldo">Rp 0</div>
        </div>
        <div class="summary-card masuk">
          <div class="label">Total Pemasukan</div>
          <div class="value" id="sumMasuk">Rp 0</div>
        </div>
        <div class="summary-card keluar">
          <div class="label">Total Pengeluaran</div>
          <div class="value" id="sumKeluar">Rp 0</div>
        </div>
      </div>

      <!-- ── Saldo per akun ── -->
      <div class="toolbar-row">
        <h2>Saldo per Akun</h2>
      </div>
      <div class="account-grid" id="accountGrid"></div>

      <!-- ── Kelola akun ── -->
      <div class="form-card">
        <h3>Kelola Akun</h3>
        <div class="account-manage" id="accountTags"></div>
        <div class="account-add-row">
          <input type="text" id="f_akun_baru"
            placeholder="Nama akun baru, misal: Bank BCA, Bank Mandiri, Dompet Digital" />
          <button type="button" id="addAccountBtn">+ Tambah Akun</button>
        </div>
      </div>

      <!-- ── Form transaksi manual ── -->
      <div class="form-card">
        <h3>Catat Transaksi Manual</h3>
        <form id="txForm">
          <div class="field">
            <label>Jenis</label>
            <div class="pill-row" id="tipePillRow">
              <button type="button" class="pill selected masuk" data-tipe="Masuk">💰 Pemasukan</button>
              <button type="button" class="pill keluar" data-tipe="Keluar">📤 Pengeluaran</button>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Kategori</label>
              <input type="text" id="f_kategori" placeholder="Bahan baku, Ongkos kirim, Modal, dll" required />
            </div>
            <div class="field">
              <label>Nominal</label>
              <input type="number" id="f_nominal" min="1" required />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Akun</label>
              <select id="f_akun_tx"></select>
            </div>
            <div class="field">
              <label>Keterangan</label>
              <input type="text" id="f_keterangan" placeholder="Detail transaksi (opsional)" />
            </div>
          </div>
          <button type="submit" class="btn-primary" id="saveTxBtn">Simpan Transaksi</button>
        </form>
      </div>

      <!-- ── List transaksi ── -->
      <div class="toolbar-row">
        <h2>Riwayat Transaksi</h2>
        <div class="filter-btns" id="filterBtns">
          <button class="filter-btn active" data-tipe="semua">Semua</button>
          <button class="filter-btn" data-tipe="Masuk">Pemasukan</button>
          <button class="filter-btn" data-tipe="Keluar">Pengeluaran</button>
        </div>
      </div>
      <div id="txList">
        <div class="empty-state">Memuat transaksi...</div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin-core.js?v=8"></script>
  <script>
    let transactions = [];
    let accounts = [];
    let currentFilter = 'semua';
    let selectedTipe = 'Masuk';

    function adminRequestHeaders(json) {
      const h = { Authorization: `Bearer ${window.adminToken}` };
      if (json) h['Content-Type'] = 'application/json';
      return h;
    }

    async function apiGetTransactions() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/finance`, { headers: adminRequestHeaders() });
      return res.json();
    }
    async function apiGetAccounts() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/accounts`, { headers: adminRequestHeaders() });
      return res.json();
    }
    async function apiCreateAccount(nama) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/accounts`, { method: 'POST', headers: adminRequestHeaders(true), body: JSON.stringify({ nama }) });
      return res.json();
    }
    async function apiDeleteAccount(id) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/accounts/${id}`, { method: 'DELETE', headers: adminRequestHeaders() });
      return res.json();
    }
    async function apiCreateTransaction(data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/finance`, { method: 'POST', headers: adminRequestHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiDeleteTransaction(id) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/finance/${id}`, { method: 'DELETE', headers: adminRequestHeaders() });
      return res.json();
    }

    async function tryLoginCb(token) {
      const [txJson, accJson] = await Promise.all([apiGetTransactions(), apiGetAccounts()]);
      if (txJson.status !== 'success') throw new Error(txJson.message || 'gagal');
      if (accJson.status !== 'success') throw new Error(accJson.message || 'gagal');
      transactions = txJson.data;
      accounts = accJson.data;
      renderAll();
    }

    window.requireAuth(tryLoginCb);

    function fmt(n) { return isNaN(n) ? 'Rp\u00a00' : 'Rp\u00a0' + Math.round(n).toLocaleString('id-ID'); }

    /* ═══════════════════════════════════════════════════════
       KELOLA AKUN
    ═══════════════════════════════════════════════════════ */
    function renderAccountTags() {
      const wrap = document.getElementById('accountTags');
      if (!accounts.length) { wrap.innerHTML = '<span style="font-size:12px;color:var(--ink-muted);">Belum ada akun.</span>'; return; }
      wrap.innerHTML = accounts.map(a => `
    <span class="account-tag">
      ${a.nama}
      <button type="button" data-action="delete-account" data-id="${a.id}" title="Hapus akun">✕</button>
    </span>
  `).join('');
    }

    function populateAccountSelect(selectEl, selectedVal) {
      selectEl.innerHTML = accounts.length
        ? accounts.map(a => `<option value="${a.nama}" ${a.nama === selectedVal ? 'selected' : ''}>${a.nama}</option>`).join('')
        : '<option value="Kas">Kas</option>';
    }

    document.getElementById('addAccountBtn').addEventListener('click', async () => {
      const input = document.getElementById('f_akun_baru');
      const nama = input.value.trim();
      if (!nama) { showStatus('Isi dulu nama akunnya.', false); return; }

      const json = await apiCreateAccount(nama);
      if (json.status === 'success') {
        accounts.push({ id: json.data.id, nama: json.data.nama });
        renderAccountTags();
        populateAccountSelect(document.getElementById('f_akun_tx'), null);
        input.value = '';
        showStatus('Akun ditambahkan.', true);
      } else {
        showStatus('Gagal: ' + json.message, false);
      }
    });

    document.getElementById('accountTags').addEventListener('click', async e => {
      const btn = e.target.closest('[data-action="delete-account"]');
      if (!btn) return;
      const id = btn.dataset.id;
      if (!confirm('Hapus akun ini? Transaksi lama yang udah tercatat pakai akun ini gak akan ikut terhapus.')) return;

      const json = await apiDeleteAccount(id);
      if (json.status === 'success') {
        accounts = accounts.filter(a => String(a.id) !== String(id));
        renderAccountTags();
        populateAccountSelect(document.getElementById('f_akun_tx'), null);
        showStatus('Akun dihapus.', true);
      } else {
        showStatus('Gagal: ' + json.message, false);
      }
    });

    /* ═══════════════════════════════════════════════════════
       FORM — pilih tipe transaksi
    ═══════════════════════════════════════════════════════ */
    document.getElementById('tipePillRow').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#tipePillRow .pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      selectedTipe = pill.dataset.tipe;
    });

    document.getElementById('txForm').addEventListener('submit', async e => {
      e.preventDefault();

      const data = {
        tipe: selectedTipe,
        kategori: document.getElementById('f_kategori').value.trim(),
        keterangan: document.getElementById('f_keterangan').value.trim(),
        nominal: parseInt(document.getElementById('f_nominal').value || '0', 10),
        akun: document.getElementById('f_akun_tx').value || 'Kas',
      };

      if (!data.nominal || data.nominal <= 0) { showStatus('Nominal harus lebih dari 0.', false); return; }

      const btn = document.getElementById('saveTxBtn');
      btn.disabled = true; btn.textContent = 'Menyimpan...';

      try {
        const json = await apiCreateTransaction(data);
        if (json.status === 'success') {
          showStatus('Transaksi tersimpan.', true);
          document.getElementById('txForm').reset();
          populateAccountSelect(document.getElementById('f_akun_tx'), null);
          await refreshTransactions();
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      } catch (err) {
        showStatus('Gagal konek ke server: ' + err.message, false);
      }

      btn.disabled = false; btn.textContent = 'Simpan Transaksi';
    });

    /* ═══════════════════════════════════════════════════════
       LIST & RINGKASAN
    ═══════════════════════════════════════════════════════ */
    async function refreshTransactions() {
      try {
        const json = await apiGetTransactions();
        if (json.status === 'success') {
          transactions = json.data;
          renderAll();
        } else {
          document.getElementById('txList').innerHTML = `<div class="empty-state">Gagal memuat: ${json.message}</div>`;
        }
      } catch (err) {
        document.getElementById('txList').innerHTML = `<div class="empty-state">Gagal konek ke server: ${err.message}</div>`;
      }
    }

    function renderAll() {
      renderAccountTags();
      populateAccountSelect(document.getElementById('f_akun_tx'), null);
      renderSummary();
      renderAccountBalances();
      renderTransactions();
    }

    function renderSummary() {
      let masuk = 0, keluar = 0;
      transactions.forEach(t => {
        const nominal = Number(t.nominal || 0);
        if (t.tipe === 'Keluar') keluar += nominal;
        else masuk += nominal;
      });
      document.getElementById('sumMasuk').textContent = fmt(masuk);
      document.getElementById('sumKeluar').textContent = fmt(keluar);
      document.getElementById('sumSaldo').textContent = fmt(masuk - keluar);
    }

    function renderAccountBalances() {
      const wrap = document.getElementById('accountGrid');

      // Kumpulin semua nama akun yang muncul (dari daftar akun + dari transaksi lama yang mungkin
      // pakai akun yang udah dihapus dari daftar, biar saldonya tetap kelihatan)
      const names = new Set(accounts.map(a => a.nama));
      transactions.forEach(t => { if (t.akun) names.add(t.akun); });

      if (!names.size) { wrap.innerHTML = '<div class="empty-state">Belum ada akun.</div>'; return; }

      const balances = {};
      names.forEach(n => balances[n] = 0);
      transactions.forEach(t => {
        const akun = t.akun || 'Kas';
        if (!(akun in balances)) balances[akun] = 0;
        balances[akun] += (t.tipe === 'Keluar' ? -1 : 1) * Number(t.nominal || 0);
      });

      wrap.innerHTML = Object.keys(balances).map(n => `
    <div class="account-card">
      <div class="label">${n}</div>
      <div class="value">${fmt(balances[n])}</div>
    </div>
  `).join('');
    }

    document.getElementById('filterBtns').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.tipe;
      renderTransactions();
    });

    function renderTransactions() {
      const wrap = document.getElementById('txList');
      const filtered = currentFilter === 'semua' ? transactions : transactions.filter(t => t.tipe === currentFilter);

      if (!filtered.length) {
        wrap.innerHTML = '<div class="empty-state">Belum ada transaksi.</div>';
        return;
      }

      wrap.innerHTML = filtered.map(t => {
        const ts = t.timestamp ? new Date(t.timestamp).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) : '';
        const isMasuk = t.tipe !== 'Keluar';
        const sumber = (t.sumber || 'Manual').toLowerCase();
        const isManual = sumber === 'manual';
        return `
    <div class="tx-row" data-id="${t.id}">
      <div class="tx-left">
        <div class="tx-desc">${t.kategori || '-'}</div>
        <div class="tx-meta">${t.keterangan ? t.keterangan + ' · ' : ''}${ts}</div>
        <div class="tx-akun">🏦 ${t.akun || 'Kas'}</div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${isMasuk ? 'masuk' : 'keluar'}">${isMasuk ? '+' : '−'} ${fmt(Number(t.nominal || 0))}</div>
        <span class="source-badge ${sumber}">${t.sumber || 'Manual'}</span>
        ${isManual ? `<button class="icon-btn danger" data-action="delete" data-id="${t.id}">Hapus</button>` : ''}
      </div>
    </div>`;
      }).join('');
    }

    document.getElementById('txList').addEventListener('click', async e => {
      const btn = e.target.closest('.icon-btn[data-action="delete"]');
      if (!btn) return;
      const id = btn.dataset.id;
      if (!confirm('Hapus transaksi ini? Tindakan tidak bisa dibatalkan.')) return;
      btn.disabled = true;
      const json = await apiDeleteTransaction(id);
      btn.disabled = false;
      if (json.status === 'success') {
        transactions = transactions.filter(t => String(t.id) !== String(id));
        renderAll();
        showStatus('Transaksi dihapus.', true);
      } else {
        showStatus('Gagal: ' + json.message, false);
      }
    });

    /* ═══════════════════════════════════════════════════════
       PWA
    ═══════════════════════════════════════════════════════ */
    window.registerSW();
  </script>
</body>

</html>
