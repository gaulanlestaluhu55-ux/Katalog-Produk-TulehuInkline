<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Admin — Katalog Sablon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="css/admin.css" rel="stylesheet" />
  <style>
    /* ── Product list ── */
    .product-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .product-row.inactive {
      opacity: 0.55;
    }

    .product-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: var(--bg);
      object-fit: contain;
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: 14px;
      font-weight: 600;
    }

    .product-meta {
      font-size: 12px;
      color: var(--ink-muted);
    }

    .product-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge-inactive {
      font-size: 10px;
      background: var(--warn-bg);
      color: var(--warn-text);
      padding: 2px 7px;
      border-radius: 8px;
      margin-left: 6px;
    }
  </style>
</head>

<body>

  <!-- ═══ LOGIN ═══ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>Admin Katalog</h1>
      <p>Masukkan token admin buat kelola produk.</p>
      <form id="loginForm" onsubmit="event.preventDefault();">
        <input type="password" id="tokenInput" placeholder="Token admin" autocomplete="off" />
        <button type="button" id="loginBtn">Masuk</button>
        <div class="login-error" id="loginError">Token salah atau gagal konek ke server.</div>
      </form>
    </div>
  </div>

  <!-- ═══ ADMIN APP ═══ -->
  <div class="admin-app" id="adminApp">
    <header>
      <div class="header-inner">
        <div class="brand">Admin Katalog<div class="brand-sub">Tulehu Inkline</div>
        </div>
        <div class="header-actions">
          <a class="link-btn" href="dashboard.html">Dashboard</a>
          <a class="link-btn" href="pesanan.html">Daftar Pesanan</a>
          <a class="link-btn" href="keuangan.html">Keuangan</a>
          <a class="link-btn" href="stok.html">Stok Vendor</a>
          <a class="link-btn" href="vendor.html">Daftar Vendor</a>
          <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="toolbar-row">
        <h2>Produk</h2>
        <button class="btn-primary" id="addBtn">+ Tambah Produk</button>
      </div>

      <div class="status-msg" id="statusMsg"></div>
      <div id="productList">
        <div class="empty-state">Memuat produk...</div>
      </div>
    </div>
  </div>

  <!-- ═══ FORM MODAL ═══ -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h3 id="modalTitle">Tambah Produk</h3>
      <form id="productForm">
        <div class="field">
          <label>Nama Produk</label>
          <input type="text" id="f_nama" required />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Kategori</label>
            <input type="text" id="f_kategori" placeholder="Kaos / Jersey" />
          </div>
          <div class="field">
            <label>Badge</label>
            <input type="text" id="f_badge" placeholder="Best Seller" />
          </div>
        </div>
        <div class="field">
          <label>Deskripsi</label>
          <textarea id="f_deskripsi"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Harga</label>
            <input type="number" id="f_harga" required />
          </div>
          <div class="field">
            <label>Satuan</label>
            <input type="text" id="f_satuan" placeholder="/pcs" value="/pcs" />
          </div>
        </div>
        <div class="field">
          <label>Gambar (pisah pakai | buat multi gambar)</label>
          <textarea id="f_gambar" placeholder="https://.../1.jpg|https://.../2.jpg"></textarea>
          <div class="field-hint">Contoh: link1.jpg|link2.jpg|link3.jpg</div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Harga Nama (jersey)</label>
            <input type="number" id="f_harga_nama" />
          </div>
          <div class="field">
            <label>Harga Angka (jersey)</label>
            <input type="number" id="f_harga_angka" />
          </div>
        </div>
        <div class="field">
          <label>Harga Nama+Angka (jersey)</label>
          <input type="number" id="f_harga_nama_angka" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Batal</button>
          <button type="submit" class="btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin-core.js"></script>
  <script>
    let products = [];
    let editingId = null;

    async function apiGet() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/products`, {
        headers: window.authHeaders(),
      });
      return res.json();
    }

    async function apiCreateProduct(data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/products`, {
        method: 'POST',
        headers: window.authHeaders(true),
        body: JSON.stringify(data),
      });
      return res.json();
    }

    async function apiUpdateProduct(id, data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/products/${id}`, {
        method: 'PUT',
        headers: window.authHeaders(true),
        body: JSON.stringify(data),
      });
      return res.json();
    }

    async function apiToggleActive(id, aktif) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/products/${id}`, {
        method: 'PATCH',
        headers: window.authHeaders(true),
        body: JSON.stringify({ aktif }),
      });
      return res.json();
    }

    async function tryLoginCb(token) {
      const json = await apiGet();
      if (json.status !== 'success') throw new Error(json.message || 'gagal');
      products = json.data;
      renderProducts();
    }

    window.initLogin(tryLoginCb);

    /* ═══════════════════════════════════════════════════════
       RENDER PRODUCT LIST
    ═══════════════════════════════════════════════════════ */
    function firstImage(gambar) {
      if (!gambar) return '';
      return String(gambar).split('|')[0].trim();
    }

    function isActive(p) {
      return !(p.aktif === false || String(p.aktif).toUpperCase() === 'FALSE');
    }

    function renderProducts() {
      const wrap = document.getElementById('productList');
      if (!products.length) {
        wrap.innerHTML = '<div class="empty-state">Belum ada produk. Klik "+ Tambah Produk".</div>';
        return;
      }
      wrap.innerHTML = products.map(p => {
        const active = isActive(p);
        const thumb = firstImage(p.gambar);
        return `
    <div class="product-row ${active ? '' : 'inactive'}">
      ${thumb ? `<img class="product-thumb" src="${thumb}" onerror="this.style.visibility='hidden'">` : `<div class="product-thumb"></div>`}
      <div class="product-info">
        <div class="product-name">${p.nama}${active ? '' : '<span class="badge-inactive">Nonaktif</span>'}</div>
        <div class="product-meta">${p.kategori || '-'} · Rp${Number(p.harga || 0).toLocaleString('id-ID')}${p.satuan || ''}</div>
      </div>
      <div class="product-actions">
        <button class="icon-btn" data-action="edit" data-id="${p.id}">Edit</button>
        <button class="icon-btn ${active ? 'danger' : ''}" data-action="toggle" data-id="${p.id}">${active ? 'Nonaktifkan' : 'Aktifkan'}</button>
      </div>
    </div>`;
      }).join('');
    }

    document.getElementById('productList').addEventListener('click', async e => {
      const btn = e.target.closest('.icon-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      const p = products.find(x => String(x.id) === String(id));
      if (!p) return;

      if (btn.dataset.action === 'edit') {
        openModal(p);
      }

      if (btn.dataset.action === 'toggle') {
        const nextActive = !isActive(p);
        btn.disabled = true;
        const json = await apiToggleActive(id, nextActive);
        btn.disabled = false;
        if (json.status === 'success') {
          p.aktif = nextActive;
          renderProducts();
          showStatus(nextActive ? 'Produk diaktifkan.' : 'Produk dinonaktifkan.', true);
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      }
    });

    /* ═══════════════════════════════════════════════════════
       MODAL FORM (tambah / edit)
    ═══════════════════════════════════════════════════════ */
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const form = document.getElementById('productForm');

    function openModal(p) {
      editingId = p ? p.id : null;
      modalTitle.textContent = p ? 'Edit Produk' : 'Tambah Produk';

      document.getElementById('f_nama').value = p ? p.nama || '' : '';
      document.getElementById('f_kategori').value = p ? p.kategori || '' : '';
      document.getElementById('f_badge').value = p ? p.badge || '' : '';
      document.getElementById('f_deskripsi').value = p ? p.deskripsi || '' : '';
      document.getElementById('f_harga').value = p ? p.harga || '' : '';
      document.getElementById('f_satuan').value = p ? (p.satuan || '/pcs') : '/pcs';
      document.getElementById('f_gambar').value = p ? p.gambar || '' : '';
      document.getElementById('f_harga_nama').value = p ? p.harga_nama || '' : '';
      document.getElementById('f_harga_angka').value = p ? p.harga_angka || '' : '';
      document.getElementById('f_harga_nama_angka').value = p ? p.harga_nama_angka || '' : '';

      modalBackdrop.classList.add('show');
    }

    function closeModal() {
      modalBackdrop.classList.remove('show');
      editingId = null;
      form.reset();
    }

    document.getElementById('addBtn').addEventListener('click', () => openModal(null));
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';

      const data = {
        nama: document.getElementById('f_nama').value.trim(),
        kategori: document.getElementById('f_kategori').value.trim(),
        badge: document.getElementById('f_badge').value.trim(),
        deskripsi: document.getElementById('f_deskripsi').value.trim(),
        harga: document.getElementById('f_harga').value,
        satuan: document.getElementById('f_satuan').value.trim(),
        gambar: document.getElementById('f_gambar').value.trim(),
        harga_nama: document.getElementById('f_harga_nama').value,
        harga_angka: document.getElementById('f_harga_angka').value,
        harga_nama_angka: document.getElementById('f_harga_nama_angka').value,
      };

      try {
        let json;
        if (editingId) {
          json = await apiUpdateProduct(editingId, data);
        } else {
          json = await apiCreateProduct(data);
        }

        if (json.status === 'success') {
          showStatus(editingId ? 'Produk diupdate.' : 'Produk ditambahkan.', true);
          closeModal();
          const refreshed = await apiGet();
          products = refreshed.data;
          renderProducts();
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      } catch (err) {
        showStatus('Gagal konek ke server: ' + err.message, false);
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'Simpan';
    });

    /* ═══════════════════════════════════════════════════════
       PWA
    ═══════════════════════════════════════════════════════ */
    window.registerSW();

  </script>
</body>

</html>
