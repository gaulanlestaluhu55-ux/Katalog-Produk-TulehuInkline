<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Daftar Pesanan — Katalog Sablon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="css/admin.css" rel="stylesheet" />
  <style>
    .price-summary {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin: 4px 0 14px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .price-summary .total {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      margin-top: 2px;
    }

    .order-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .order-name {
      font-size: 14px;
      font-weight: 600;
    }

    .order-meta {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .order-total {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .order-customer {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 6px;
    }

    .order-note {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 4px;
      font-style: italic;
    }

    .order-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .payment-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
    }

    .payment-info {
      font-size: 12px;
      color: var(--ink-soft);
    }

    .payment-info b {
      color: var(--ink);
    }

    .payment-update {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .payment-update input {
      width: 110px;
      height: 30px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    .payment-update input:focus {
      border-color: var(--ink);
    }
  </style>
</head>

<body>

  <!-- ═══ LOGIN ═══ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>Daftar Pesanan</h1>
      <p>Masukkan token admin buat catat & kelola pesanan.</p>
      <input type="password" id="tokenInput" placeholder="Token admin" autocomplete="off" />
      <button id="loginBtn">Masuk</button>
      <div class="login-error" id="loginError">Token salah atau gagal konek ke server.</div>
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div class="admin-app" id="adminApp">
    <header>
      <div class="header-inner">
        <div class="brand">Daftar Pesanan<div class="brand-sub">Tulehu Inkline</div>
        </div>
        <div class="header-actions">
          <a class="link-btn" href="dashboard.html">Dashboard</a>
          <a class="link-btn" href="admin.html">Admin Produk</a>
          <a class="link-btn" href="keuangan.html">Keuangan</a>
          <a class="link-btn" href="stok.html">Stok Vendor</a>
          <a class="link-btn" href="vendor.html">Daftar Vendor</a>
          <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div class="status-msg" id="statusMsg"></div>

      <!-- ── List pesanan ── -->
      <div class="toolbar-row">
        <h2>Pesanan Masuk</h2>
        <div class="filter-btns" id="filterBtns">
          <button class="filter-btn active" data-status="semua">Semua</button>
          <button class="filter-btn" data-status="Baru">Baru</button>
          <button class="filter-btn" data-status="Diproses">Diproses</button>
          <button class="filter-btn" data-status="Selesai">Selesai</button>
          <button class="filter-btn" data-status="Diambil">Diambil</button>
          <button class="filter-btn" data-status="Batal">Batal</button>
        </div>
      </div>
      <div id="orderList">
        <div class="empty-state">Memuat pesanan...</div>
      </div>

      <!-- ── Form catat pesanan baru ── -->
      <div class="toolbar-row" style="margin-top: 1.75rem;">
        <h2>Catat Pesanan Baru</h2>
      </div>
      <div class="form-card">
        <form id="orderForm">
          <div class="field">
            <label>Produk</label>
            <select id="f_produk" required>
              <option value="">Memuat produk...</option>
            </select>
          </div>

          <div id="optionsWrap"></div>

          <div class="field-row">
            <div class="field">
              <label>Qty</label>
              <input type="number" id="f_qty" min="1" value="1" required />
            </div>
            <div class="field">
              <label>DP Awal (opsional)</label>
              <input type="number" id="f_dp" min="0" value="0" />
            </div>
            <div class="field">
              <label>Masuk Akun</label>
              <select id="f_akun_dp">
                <option value="Kas">Kas</option>
              </select>
            </div>
          </div>

          <div class="price-summary" id="priceSummary">Pilih produk dulu buat lihat harga.</div>

          <div class="field-row">
            <div class="field">
              <label>Nama Customer</label>
              <input type="text" id="f_nama_customer" required />
            </div>
            <div class="field">
              <label>Kontak (opsional)</label>
              <input type="text" id="f_kontak" placeholder="08xx / @username" />
            </div>
          </div>

          <div class="field">
            <label>Catatan</label>
            <textarea id="f_catatan" placeholder="Detail desain, deadline, dll (opsional)"></textarea>
          </div>

          <button type="submit" class="btn-primary" id="saveOrderBtn">Simpan Pesanan</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/admin-core.js"></script>
  <script>
    let products = [];
    let orders = [];
    let accounts = [];
    let currentFilter = 'semua';
    let selectedOpts = { size: null, sleeve: null, color: null, nameset: null };

    function authHeaders(json) {
      return window.authHeaders(json);
    }

    async function apiGetProducts() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/products`, { headers: authHeaders() });
      return res.json();
    }
    async function apiGetOrders() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/orders`, { headers: authHeaders() });
      return res.json();
    }
    async function apiGetAccounts() {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/accounts`, { headers: authHeaders() });
      return res.json();
    }
    async function apiCreateOrder(data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/orders`, { method: 'POST', headers: authHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiUpdateOrderStatus(id, data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/orders/${id}`, { method: 'PUT', headers: authHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiUpdatePayment(id, data) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/orders/${id}?action=payment`, { method: 'PUT', headers: authHeaders(true), body: JSON.stringify(data) });
      return res.json();
    }
    async function apiDeleteOrder(id) {
      const res = await apiFetch(`${CONFIG.apiUrl}/api/orders/${id}`, { method: 'DELETE', headers: authHeaders() });
      return res.json();
    }

    async function tryLoginCb(token) {
      const [prodJson, accJson, ordJson] = await Promise.all([apiGetProducts(), apiGetAccounts(), apiGetOrders()]);
      if (prodJson.status !== 'success') throw new Error(prodJson.message || 'gagal');

      products = prodJson.data;
      populateProductSelect();

      if (accJson.status === 'success') accounts = accJson.data;
      populateAccountSelects();

      if (ordJson.status === 'success') orders = ordJson.data;
      renderOrders();
    }

    window.initLogin(tryLoginCb);

    /* ═══════════════════════════════════════════════════════
       HELPERS — harga (logic sama kayak katalog helpers.js)
    ═══════════════════════════════════════════════════════ */
    function isKaos(p) { return !isJersey(p); }

    function getSurcharge(opts) {
      let extra = 0;
      if (opts.sleeve === 'Lengan Panjang') extra += CONFIG.surcharge.lenganPanjang;
      if (opts.size === 'XXL') extra += CONFIG.surcharge.xxl;
      if (opts.size === '3XL') extra += CONFIG.surcharge.xxxl;
      return extra;
    }
    function getNameSetPrice(p, ns) {
      if (!ns) return 0;
      if (ns === 'Nama saja') return toNum(p.harga_nama);
      if (ns === 'Angka saja') return toNum(p.harga_angka);
      if (ns === 'Nama + Angka') return toNum(p.harga_nama_angka);
      return 0;
    }
    function getUnitPrice(p, opts) {
      if (isKaos(p)) return toNum(p.harga) + getSurcharge(opts);
      if (isJersey(p)) return toNum(p.harga) + getNameSetPrice(p, opts.nameset);
      return toNum(p.harga);
    }
    function optsSummary(p, opts) {
      if (isKaos(p)) return `Size: ${opts.size || '-'}, Lengan: ${opts.sleeve || '-'}, Warna: ${opts.color || '-'}`;
      if (isJersey(p)) return `Name set: ${opts.nameset || '-'}`;
      return '-';
    }
    function isOptsReady(p, opts) {
      if (isKaos(p)) return !!(opts.size && opts.sleeve && opts.color);
      if (isJersey(p)) return !!opts.nameset;
      return true;
    }

    /* ═══════════════════════════════════════════════════════
       FORM — pilih produk & render opsi dinamis
    ═══════════════════════════════════════════════════════ */
    function populateProductSelect() {
      const sel = document.getElementById('f_produk');
      sel.innerHTML = '<option value="">— Pilih produk —</option>' +
        products.map((p, i) => `<option value="${i}">${p.nama} (${p.kategori || '-'})</option>`).join('');
    }

    function accountOptionsHtml(selectedVal) {
      if (!accounts.length) return `<option value="Kas">Kas</option>`;
      return accounts.map(a => `<option value="${a.nama}" ${a.nama === selectedVal ? 'selected' : ''}>${a.nama}</option>`).join('');
    }

    function populateAccountSelects() {
      document.getElementById('f_akun_dp').innerHTML = accountOptionsHtml('Kas');
    }

    function pillRow(group, options, selectedVal) {
      return `<div class="pill-row" data-group="${group}">` +
        options.map(v => `<button type="button" class="pill ${v === selectedVal ? 'selected' : ''}" data-group="${group}" data-val="${v}">${v}</button>`).join('') +
        `</div>`;
    }

    function renderOptionsForm() {
      const idx = document.getElementById('f_produk').value;
      const wrap = document.getElementById('optionsWrap');
      if (idx === '') { wrap.innerHTML = ''; updatePriceSummary(); return; }

      const p = products[idx];
      selectedOpts = { size: null, sleeve: null, color: null, nameset: null };

      if (isKaos(p)) {
        wrap.innerHTML = `
      <div class="field"><label>Ukuran</label>${pillRow('size', CONFIG.kaos.sizes, null)}</div>
      <div class="field"><label>Lengan</label>${pillRow('sleeve', CONFIG.kaos.sleeves, null)}</div>
      <div class="field"><label>Warna</label>${pillRow('color', CONFIG.kaos.colors, null)}</div>
    `;
      } else if (isJersey(p)) {
        wrap.innerHTML = `<div class="field"><label>Name Set</label>${pillRow('nameset', CONFIG.jersey.nameSets, null)}</div>`;
      } else {
        wrap.innerHTML = '';
      }
      updatePriceSummary();
    }

    document.getElementById('f_produk').addEventListener('change', renderOptionsForm);
    document.getElementById('f_qty').addEventListener('input', updatePriceSummary);

    document.getElementById('optionsWrap').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      const group = pill.dataset.group;
      const val = pill.dataset.val;
      pill.closest('.pill-row').querySelectorAll('.pill').forEach(b => b.classList.remove('selected'));
      pill.classList.add('selected');
      selectedOpts[group] = val;
      updatePriceSummary();
    });

    function updatePriceSummary() {
      const idx = document.getElementById('f_produk').value;
      const box = document.getElementById('priceSummary');
      if (idx === '') { box.textContent = 'Pilih produk dulu buat lihat harga.'; return; }

      const p = products[idx];
      const qty = Math.max(1, parseInt(document.getElementById('f_qty').value || '1', 10));
      const unit = getUnitPrice(p, selectedOpts);
      const total = unit * qty;

      box.innerHTML = `
    Harga satuan: ${fmt(unit)}${p.satuan || '/pcs'}<br/>
    <div class="total">Total (${qty} pcs): ${fmt(total)}</div>
  `;
    }

    /* ═══════════════════════════════════════════════════════
       SUBMIT PESANAN
    ═══════════════════════════════════════════════════════ */
    document.getElementById('orderForm').addEventListener('submit', async e => {
      e.preventDefault();
      const idx = document.getElementById('f_produk').value;
      if (idx === '') { showStatus('Pilih produk dulu.', false); return; }

      const p = products[idx];
      if (!isOptsReady(p, selectedOpts)) { showStatus('Lengkapi dulu opsi produk (ukuran/warna/name set).', false); return; }

      const qty = Math.max(1, parseInt(document.getElementById('f_qty').value || '1', 10));
      const unit = getUnitPrice(p, selectedOpts);
      const total = unit * qty;
      const dp = Math.max(0, parseInt(document.getElementById('f_dp').value || '0', 10));
      const akunDp = document.getElementById('f_akun_dp').value || 'Kas';

      const data = {
        id_produk: p.id || '',
        nama_produk: p.nama,
        kategori: p.kategori || '',
        opsi: optsSummary(p, selectedOpts),
        size: selectedOpts.size || '',
        warna: selectedOpts.color || '',
        lengan: selectedOpts.sleeve || '',
        qty: qty,
        harga_satuan: unit,
        total: total,
        nama_customer: document.getElementById('f_nama_customer').value.trim(),
        kontak: document.getElementById('f_kontak').value.trim(),
        catatan: document.getElementById('f_catatan').value.trim(),
        status: 'Baru',
        nominal_dibayar: dp,
        akun: akunDp,
      };

      const btn = document.getElementById('saveOrderBtn');
      btn.disabled = true; btn.textContent = 'Menyimpan...';

      try {
        const json = await apiCreateOrder(data);
        if (json.status === 'success') {
          showStatus('Pesanan tersimpan.', true);
          document.getElementById('orderForm').reset();
          document.getElementById('optionsWrap').innerHTML = '';
          document.getElementById('f_qty').value = 1;
          document.getElementById('f_dp').value = 0;
          populateAccountSelects();
          document.getElementById('priceSummary').textContent = 'Pilih produk dulu buat lihat harga.';
          await refreshOrders();
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      } catch (err) {
        showStatus('Gagal konek ke server: ' + err.message, false);
      }

      btn.disabled = false; btn.textContent = 'Simpan Pesanan';
    });

    /* ═══════════════════════════════════════════════════════
       LIST PESANAN
    ═══════════════════════════════════════════════════════ */
    async function refreshOrders() {
      const json = await apiGetOrders();
      if (json.status === 'success') {
        orders = json.data;
        renderOrders();
      } else {
        document.getElementById('orderList').innerHTML = `<div class="empty-state">Gagal memuat: ${json.message}</div>`;
      }
    }

    document.getElementById('filterBtns').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      renderOrders();
    });

    const STATUS_LIST = ['Baru', 'Diproses', 'Selesai', 'Diambil', 'Batal'];

    function renderOrders() {
      const wrap = document.getElementById('orderList');
      const filtered = currentFilter === 'semua' ? orders : orders.filter(o => o.status === currentFilter);

      if (!filtered.length) {
        wrap.innerHTML = '<div class="empty-state">Belum ada pesanan.</div>';
        return;
      }

      wrap.innerHTML = filtered.map(o => {
        const statusClass = (o.status || 'baru').toLowerCase();
        const ts = o.timestamp ? new Date(o.timestamp).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) : '';

        const total = Number(o.total || 0);
        const dibayar = Number(o.nominal_dibayar || 0);
        const sisa = o.sisa !== undefined && o.sisa !== '' ? Number(o.sisa) : (total - dibayar);
        const statusBayar = o.status_bayar || 'Belum Bayar';
        const bayarClass = statusBayar.toLowerCase().replace(/\s+/g, '-');
        const isBatal = o.status === 'Batal';

        return `
    <div class="order-row" data-id="${o.id}">
      <div class="order-top">
        <div>
          <div class="order-name">${o.nama_produk || '-'}</div>
          <div class="order-meta">${o.opsi || ''} · Qty ${o.qty || 0} · ${ts}</div>
        </div>
        <div class="order-total">${fmt(total)}</div>
      </div>
      <div class="order-customer">👤 ${o.nama_customer || '-'}${o.kontak ? ' · ' + o.kontak : ''}</div>
      ${o.catatan ? `<div class="order-note">📝 ${o.catatan}</div>` : ''}
      <div class="order-bottom">
        <span class="status-badge ${statusClass}">${o.status || 'Baru'}</span>
        <div style="display:flex; gap:6px; align-items:center;">
          <select class="status-select" data-id="${o.id}">
            ${STATUS_LIST.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
          <button class="icon-btn danger" data-action="delete" data-id="${o.id}">Hapus</button>
        </div>
      </div>
      <div class="payment-row">
        <div class="payment-info">
          <span class="status-badge ${bayarClass}">${statusBayar}</span>
          Dibayar: <b>${fmt(dibayar)}</b> · Sisa: <b>${fmt(Math.max(0, sisa))}</b>
        </div>
        ${isBatal ? '' : `
        <div class="payment-update">
          <input type="number" min="0" placeholder="Total dibayar" data-id="${o.id}" class="payment-input" />
          <select class="status-select payment-akun" data-id="${o.id}">${accountOptionsHtml('Kas')}</select>
          <button class="icon-btn" data-action="update-payment" data-id="${o.id}">Update Bayar</button>
        </div>`}
      </div>
    </div>`;
      }).join('');
    }

    document.getElementById('orderList').addEventListener('change', async e => {
      const sel = e.target.closest('.status-select');
      if (!sel) return;
      const id = sel.dataset.id;
      const newStatus = sel.value;
      sel.disabled = true;
      const json = await apiUpdateOrderStatus(id, { status: newStatus });
      sel.disabled = false;
      if (json.status === 'success') {
        // Refresh penuh, karena status "Batal" bisa reversal nominal pembayaran di backend
        await refreshOrders();
        showStatus(newStatus === 'Batal' ? 'Pesanan dibatalkan, pembayaran otomatis di-reversal di Keuangan.' : 'Status pesanan diupdate.', true);
      } else {
        showStatus('Gagal: ' + json.message, false);
      }
    });

    document.getElementById('orderList').addEventListener('click', async e => {
      const delBtn = e.target.closest('.icon-btn[data-action="delete"]');
      if (delBtn) {
        const id = delBtn.dataset.id;
        if (!confirm('Hapus pesanan ini? Tindakan tidak bisa dibatalkan.')) return;
        delBtn.disabled = true;
        const json = await apiDeleteOrder(id);
        delBtn.disabled = false;
        if (json.status === 'success') {
          orders = orders.filter(o => String(o.id) !== String(id));
          renderOrders();
          showStatus('Pesanan dihapus.', true);
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
        return;
      }

      const payBtn = e.target.closest('.icon-btn[data-action="update-payment"]');
      if (payBtn) {
        const id = payBtn.dataset.id;
        const input = document.querySelector(`.payment-input[data-id="${id}"]`);
        const akunSel = document.querySelector(`.payment-akun[data-id="${id}"]`);
        const val = input ? input.value.trim() : '';
        if (val === '') { showStatus('Isi dulu total nominal yang sudah dibayar.', false); return; }
        const nominal = Math.max(0, parseInt(val, 10) || 0);
        const akun = akunSel ? akunSel.value : 'Kas';

        payBtn.disabled = true;
        const json = await apiUpdatePayment(id, { nominal_dibayar: nominal, akun });
        payBtn.disabled = false;

        if (json.status === 'success') {
          const o = orders.find(x => String(x.id) === String(id));
          if (o) {
            o.nominal_dibayar = json.data.nominal_dibayar;
            o.sisa = json.data.sisa;
            o.status_bayar = json.data.status_bayar;
          }
          renderOrders();
          showStatus('Pembayaran diupdate. Saldo otomatis tercatat di Keuangan.', true);
        } else {
          showStatus('Gagal: ' + json.message, false);
        }
      }
    });

    /* ═══════════════════════════════════════════════════════
       PWA
    ═══════════════════════════════════════════════════════ */
    window.registerSW();
  </script>
</body>

</html>
